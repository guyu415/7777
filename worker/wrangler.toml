name = "scheduled-message-worker"
main = "scheduled-message-worker.js"
compatibility_date = "2024-09-23"
account_id = "e364fa0eb012df759b774bfcada11422"

[[kv_namespaces]]
binding = "CHAT_KV"
id = "ee2f737d334c4af7b56a89f83b61092c"


[triggers]
crons = ["*/30 * * * *"]

[vars]
# GLM (智谱AI) OpenAI 兼容格式，路径已含 /v4，代码只追加 /chat/completions
# API Key 通过 Worker Secret 配置：Cloudflare 控制台 → Workers → scheduled-message-worker → Settings → Variables → CLAUDE_API_KEY
# NCM_APP_ID and NCM_PRIVATE_KEY are set as Worker Secrets via Cloudflare dashboard
#
# 必须配置的 Secrets（源码中不再有硬编码兜底）：
#   USER_PASSWORD  — 主动消息定时任务读取哪个用户的数据（原来硬编码在源码里，已移除）
#                    wrangler secret put USER_PASSWORD --name scheduled-message-worker
#   MUSIC_AUTH_KEY — 音乐代理的访问 key（可选；不配则仅允许 xiaoman.xyz Referer 访问）
#                    wrangler secret put MUSIC_AUTH_KEY --name scheduled-message-worker
#   VAPID_PRIVATE_KEY — Web Push 推送的 VAPID 私钥（base64url 的 P-256 d 值），
#                    与源码里的 VAPID_PUBLIC_KEY 配对；不配置则推送功能静默停用
#                    wrangler secret put VAPID_PRIVATE_KEY --name scheduled-message-worker
#   VAPID_SUBJECT  — 可选，VAPID 联系方式（mailto:...），默认见 vapidJwt()
#   NCM_COOKIE     — 可选，网易云网页版 Cookie（形如 "MUSIC_U=xxx; __csrf=xxx"，
#                    浏览器登录 music.163.com 后从开发者工具复制）。/ncm/* 代理
#                    不配也能搜索和播放免费歌曲，配 VIP 账号 Cookie 可播 VIP 歌
#                    wrangler secret put NCM_COOKIE --name scheduled-message-worker
