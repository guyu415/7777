name = "scheduled-message-worker"
main = "scheduled-message-worker.js"
compatibility_date = "2024-09-23"
account_id = "e364fa0eb012df759b774bfcada11422"

[[kv_namespaces]]
binding = "CHAT_KV"
id = "ee2f737d334c4af7b56a89f83b61092c"

[[r2_buckets]]
binding = "ASSETS_R2"
bucket_name = "pink-chat-assets"

[triggers]
crons = ["*/30 * * * *"]

[vars]
# 中转 API 地址，若用官方则保持 https://api.anthropic.com
CLAUDE_API_BASE_URL = "https://www.zovelox.com"
# CLAUDE_API_KEY 和 CLAUDE_API_BASE_URL 也可用 secret 覆盖：
# wrangler secret put CLAUDE_API_KEY
# wrangler secret put CLAUDE_API_BASE_URL
