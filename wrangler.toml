name = "ac-mcp-controller"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[durable_objects]
bindings = [
  { name = "AcMcpAgent", class_name = "AcMcpAgent" },
  { name = "DeviceStateStore", class_name = "DeviceStateStore" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AcMcpAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DeviceStateStore"]

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "416d98f1c5bd477bb58f5afbd79d25b7"

[[routes]]
pattern = "mcp.xiaoman.xyz"
custom_domain = true

[vars]
TUYA_BASE_URL  = "https://openapi-sg.iotbing.com"
TUYA_CLIENT_ID = "43pypnu4k84sxtmus9g5"
TUYA_IR_ID     = "a365b8d696e9af6606imhf"
TUYA_AC_ID     = "a3d580e07fd41298b4ufil"
# COOKIE_SECRET, TUYA_CLIENT_SECRET and DEVICE_WRITE_TOKEN are stored as wrangler secrets
