name = "ac-mcp-controller"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "AcMcpAgent", class_name = "AcMcpAgent" }
]

[[migrations]]
tag = "v1"
new_classes = ["AcMcpAgent"]

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "416d98f1c5bd477bb58f5afbd79d25b7"

[[routes]]
pattern = "ac.xiaoman.xyz/*"
zone_name = "xiaoman.xyz"

[vars]
TUYA_BASE_URL  = "https://openapi-sg.iotbing.com"
TUYA_CLIENT_ID = "43pypnu4k84sxtmus9g5"
TUYA_IR_ID     = "a365b8d696e9af6606imhf"
TUYA_AC_ID     = "a3d580e07fd41298b4ufil"
